name: CI/CD Docker Compose

on:
  workflow_dispatch:
    branches:
      - main
    inputs:
      image_tag:
        description: "Enter Image tag"
        required: true


jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        id: set-up-docker
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        id: login
        uses: docker/login-action@v2
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        shell: bash
        id: build
        if: steps.login.outcome == 'success'
        run: |
          if docker build -t ${{ vars.DOCKERHUB_USERNAME }}/travel-buddy:${{ github.event.inputs.image_tag }} .; then
            echo "Build successful"
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "Build failed"
            echo "result=build failed" >> $GITHUB_OUTPUT
          fi

      - name: Push Docker Image
        shell: bash
        id: push
        if: steps.login.outcome == 'success' && steps.build.outputs.result == 'success'
        run: |
          if docker push ${{ vars.DOCKERHUB_USERNAME }}/travel-buddy:${{ github.event.inputs.image_tag }}; then
            echo "Push successful"
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "Push failed"
            echo "result=push failed" >> $GITHUB_OUTPUT
          fi
  
      - name: Set Output result
        shell: bash
        id: final_result
        run: |
          if [ "${{ steps.login.outcome }}" != "success" ]; then
            echo "result=failure(login failed)" >> $GITHUB_OUTPUT
          elif [ "${{ steps.build.outputs.result }}" != "success" ]; then
            echo "result=failure(build failed)" >> $GITHUB_OUTPUT
          elif [ "${{ steps.push.outputs.result }}" != "success" ]; then
            echo "result=failure(push failed)" >> $GITHUB_OUTPUT
          else
            echo "result=success" >> $GITHUB_OUTPUT
          fi

      - name: Print Result
        run: |
          echo "Build and Push Result is: ${{ steps.final_result.outputs.result }}"
    


      